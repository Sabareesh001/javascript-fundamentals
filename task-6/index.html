<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6 - Flexbox Blocks</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Main container with flexbox - centers all blocks both horizontally and vertically -->
    <div class="container">
        <!-- Block 1 - Draggable element with unique ID and color styling -->
        <div draggable="true" id="block1" class="block">Block 1</div>
        <!-- Block 2 - Can be reordered by dragging -->
        <div draggable="true" id="block2" class="block">Block 2</div>
        <!-- Block 3 - Middle block with dodger blue color -->
        <div draggable="true" id="block3" class="block">Block 3</div>
        <!-- Block 4 - Second to last block with orange color -->
        <div draggable="true" id="block4" class="block">Block 4</div>
        <!-- Block 5 - Last block element -->
        <div draggable="true" id="block5" class="block">Block 5</div>
    </div>

    <!-- Link to JavaScript file for interactivity -->
    <script src="index.js"></script>
</body>

</html>
